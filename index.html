<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
     <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        .grid {
            width: 300px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 80px;
        }

        img {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<script>
function genQR() {
    var text = document.getElementById("qrtext").value;
    var size = document.getElementById("size").value;
    var img = document.getElementById("img");

    if (text.trim() === "") {
        alert("Please enter text");
        return;
    }

    // New Working API
    var url = "https://api.qrserver.com/v1/create-qr-code/?size=" 
              + size + "x" + size + "&data=" + encodeURIComponent(text);

    img.src = url;
}
</script>

<div class="grid">
    <h2>QR Code Generator</h2>

    <img id="img" src="" alt="QR Code will appear here">

    <br><br>

    <select id="size">
        <option value="100">100x100</option>
        <option value="150">150x150</option>
        <option value="200">200x200</option>
        <option value="250" selected>250x250</option>
        <option value="300">300x300</option>
    </select>

    <br><br>

    <textarea id="qrtext" placeholder="Enter your text"></textarea>

    <br><br>

    <button onclick="genQR()">Generate</button>
</div>

</body>
</html>
